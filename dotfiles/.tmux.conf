##### -------------------------------
##### 🌲 Terminal & True Color
##### -------------------------------

# 256 colors
set -g default-terminal "screen-256color"
set -as terminal-overrides ",*:Tc"


##### -------------------------------
##### ⌨️ Prefix Key (Ctrl + A)
##### -------------------------------

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix


##### -------------------------------
##### 🪟 Pane Splitting
##### -------------------------------

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v


##### -------------------------------
##### 🔄 Reload Config
##### -------------------------------

unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"


##### -------------------------------
##### 🖱️ Mouse Support
##### -------------------------------

set -g mouse on


##### -------------------------------
##### 🌲 Everforest Color Theme
##### -------------------------------

# Status bar background & text
set -g status-style bg=#2b3339,fg=#d3c6aa

# Inactive window tabs
set -g window-status-style bg=#3c4841,fg=#a7c080

# Active window tab (highlighted)
set -g window-status-current-style bg=#a7c080,fg=#2b3339

# Pane borders
set -g pane-border-style fg=#4f5b58
set -g pane-active-border-style fg=#a7c080

# Message / command line styling
set -g message-style bg=#3c4841,fg=#d3c6aa
set -g message-command-style bg=#3c4841,fg=#e69875

# Status bar left & right sections
set -g status-left "#[fg=#a7c080,bold] #S "
set -g status-right "#[fg=#7fbbb3] %Y-%m-%d %H:%M "


##### -------------------------------
##### 📋 Clipboard
##### -------------------------------

set -g set-clipboard on


##### -------------------------------
##### ✂️ Vim-Style Copy Mode
##### -------------------------------

setw -g mode-keys vi

# Start selection with 'v'
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy selection to macOS clipboard using pbcopy
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Copy when selecting with mouse
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'


##### -------------------------------
##### 🧭 Pane Navigation
##### -------------------------------

bind h select-pane -L      # Move left
bind j select-pane -D      # Move down
bind k select-pane -U      # Move up
bind l select-pane -R      # Move right


##### -------------------------------
##### 📏 Resize Panes
##### -------------------------------

bind -r Left resize-pane -L 5   # Resize left
bind -r Right resize-pane -R 5  # Resize right
bind -r Up resize-pane -U 5     # Resize up
bind -r Down resize-pane -D 5   # Resize down


##### -------------------------------
##### 🪟 Quick Layout Shortcuts
##### -------------------------------

# Prefix + 2 → exactly 2 panes
bind-key 2 kill-pane -a \; split-window -h \; select-layout even-horizontal

# Prefix + 3 → exactly 3 panes
bind-key 3 kill-pane -a \; split-window -h \; split-window -v \; select-layout tiled

# Prefix + 4 → exactly 4 panes
bind-key 4 kill-pane -a \; split-window -h \; split-window -v \; split-window -v \; select-layout tiled


##### -------------------------------
##### 💣 Kill All Windows Shortcut
##### -------------------------------

# Kill all other windows
bind-key X kill-window -a

# Kill entire session
bind-key K kill-session

# Kill all panes except current
bind-key x kill-pane -a
